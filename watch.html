<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Watch – ChessMaster CS2</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green-dark: #1a3a2a;
    --green-mid:  #2d6a4f;
    --green-accent: #52b788;
    --green-light: #95d5b2;
    --cream: #f4ede2;
    --sidebar-w: 260px;

    /* CT side = blue tones */
    --ct-primary: #4a90d9;
    --ct-bg: rgba(74,144,217,0.1);
    --ct-border: rgba(74,144,217,0.35);

    /* T side = orange/amber tones */
    --t-primary: #e8933a;
    --t-bg: rgba(232,147,58,0.1);
    --t-border: rgba(232,147,58,0.35);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--green-dark);
    color: var(--cream);
    min-height: 100vh;
    display: flex;
    overflow-x: hidden;
  }

  /* ── SIDEBAR (same as landing) ── */
  .sidebar {
    width: var(--sidebar-w);
    min-height: 100vh;
    background: #111f17;
    display: flex;
    flex-direction: column;
    padding: 28px 0 24px;
    flex-shrink: 0;
    border-right: 1px solid rgba(82,183,136,0.12);
    position: sticky;
    top: 0;
    height: 100vh;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 24px 32px;
    text-decoration: none;
  }
  .logo-text {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 900;
    color: var(--cream);
    line-height: 1;
  }
  .logo-text span { color: var(--green-accent); }

  .nav { display: flex; flex-direction: column; gap: 2px; padding: 0 12px; flex: 1; }

  .nav-btn {
    display: flex; align-items: center; gap: 14px;
    padding: 12px 16px; border-radius: 10px; border: none;
    background: transparent; color: #b8c9b8;
    font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500;
    cursor: pointer; text-align: left; transition: background 0.15s, color 0.15s; width: 100%;
  }
  .nav-btn:hover { background: rgba(82,183,136,0.13); color: var(--green-accent); }
  .nav-btn.active { background: rgba(82,183,136,0.18); color: var(--green-accent); }
  .nav-icon { width: 22px; height: 22px; flex-shrink: 0; opacity: 0.8; }
  .nav-btn:hover .nav-icon, .nav-btn.active .nav-icon { opacity: 1; }
  .nav-divider { height: 1px; background: rgba(82,183,136,0.1); margin: 10px 16px; }

  /* ── MAIN ── */
  .main {
    flex: 1;
    min-height: 100vh;
    overflow-y: auto;
    background:
      radial-gradient(ellipse 70% 50% at 80% 10%, rgba(45,106,79,0.2) 0%, transparent 60%),
      var(--green-dark);
  }

  /* Top bar */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 40px; border-bottom: 1px solid rgba(82,183,136,0.1);
    position: sticky; top: 0; z-index: 10;
    background: rgba(26,58,42,0.92); backdrop-filter: blur(8px);
  }

  .topbar-title {
    font-family: 'Playfair Display', serif;
    font-size: 22px; font-weight: 700; color: var(--cream);
  }
  .topbar-title span { color: var(--green-accent); }

  .topbar-right { display: flex; gap: 12px; }

  .btn-outline {
    padding: 9px 22px; border-radius: 8px;
    border: 1.5px solid rgba(148,213,178,0.35); background: transparent;
    color: var(--green-light); font-family: 'DM Sans', sans-serif;
    font-size: 14px; font-weight: 500; cursor: pointer; transition: border-color 0.15s, background 0.15s;
  }
  .btn-outline:hover { border-color: var(--green-accent); background: rgba(82,183,136,0.08); }

  .btn-solid {
    padding: 9px 22px; border-radius: 8px; border: none;
    background: var(--green-accent); color: #0d2017;
    font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: background 0.15s;
  }
  .btn-solid:hover { background: #63cca0; }

  /* ── PAGE CONTENT ── */
  .content { padding: 40px 40px 60px; max-width: 1200px; }

  .page-intro { margin-bottom: 40px; }
  .page-intro h1 {
    font-family: 'Playfair Display', serif;
    font-size: 36px; font-weight: 900; color: var(--cream);
    margin-bottom: 8px;
  }
  .page-intro p { font-size: 15px; color: #9dbaaa; line-height: 1.6; }

  /* Tab switcher */
  .tabs {
    display: flex; gap: 0; margin-bottom: 36px;
    border: 1px solid rgba(82,183,136,0.2); border-radius: 10px;
    overflow: hidden; width: fit-content;
  }

  .tab-btn {
    padding: 11px 32px; border: none; background: transparent;
    font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: background 0.15s, color 0.15s;
    display: flex; align-items: center; gap: 8px; letter-spacing: 0.04em;
    text-transform: uppercase; font-size: 13px;
  }

  .tab-btn.ct {
    color: #7ab8ed;
    border-right: 1px solid rgba(82,183,136,0.2);
  }
  .tab-btn.ct.active, .tab-btn.ct:hover {
    background: var(--ct-bg); color: var(--ct-primary);
  }

  .tab-btn.t { color: #e8b07a; }
  .tab-btn.t.active, .tab-btn.t:hover {
    background: var(--t-bg); color: var(--t-primary);
  }

  .tab-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }
  .ct .tab-dot { background: var(--ct-primary); }
  .t  .tab-dot { background: var(--t-primary); }

  /* Section label */
  .section-header {
    display: flex; align-items: center; gap: 12px; margin-bottom: 24px;
  }
  .section-badge {
    padding: 4px 14px; border-radius: 20px; font-size: 12px;
    font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase;
  }
  .section-badge.ct { background: var(--ct-bg); color: var(--ct-primary); border: 1px solid var(--ct-border); }
  .section-badge.t  { background: var(--t-bg);  color: var(--t-primary);  border: 1px solid var(--t-border); }

  .section-line { flex: 1; height: 1px; background: rgba(82,183,136,0.12); }

  /* Video grid */
  .video-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 24px;
  }

  .video-card {
    background: #111f17;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid rgba(82,183,136,0.1);
    transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    cursor: pointer;
  }
  .video-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 32px rgba(0,0,0,0.4);
  }
  .video-card.ct:hover { border-color: var(--ct-border); }
  .video-card.t:hover  { border-color: var(--t-border); }

  .video-embed-wrap {
    position: relative;
    width: 100%;
    padding-top: 56.25%; /* 16:9 */
    background: #0a1510;
  }

  .video-embed-wrap iframe {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    border: none;
  }

  .video-info { padding: 14px 16px 16px; }

  .video-tag {
    font-size: 11px; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; margin-bottom: 6px;
  }
  .video-tag.ct { color: var(--ct-primary); }
  .video-tag.t  { color: var(--t-primary); }

  .video-title {
    font-size: 14px; font-weight: 500; color: var(--cream);
    line-height: 1.4; margin-bottom: 8px;
  }

  .video-meta {
    font-size: 12px; color: #7ea88e;
    display: flex; align-items: center; gap: 6px;
  }
  .video-meta .dot { width: 3px; height: 3px; border-radius: 50%; background: #7ea88e; }

  /* Panel visibility */
  .panel { display: none; }
  .panel.active { display: block; }

  /* "All" shows both panels stacked */
  .all-view .ct-section { margin-bottom: 48px; }
</style>
</head>
<body>

<!-- ── SIDEBAR ── -->
<aside class="sidebar">
  <a class="logo" href="chess-landing.html">
    <svg width="38" height="38" viewBox="0 0 38 38" fill="none">
      <rect width="38" height="38" rx="8" fill="#2d6a4f"/>
      <path d="M10 28c0-2.5 1-4.5 3-5.5L11 14l3-3 2 2c1-1 2.5-1.5 4-1.5 3.5 0 6 2.5 6 6 0 2-0.8 3.8-2 5H26v4H10v-2z" fill="#f4ede2" stroke="#f4ede2" stroke-width="0.5" stroke-linejoin="round"/>
    </svg>
    <div class="logo-text">Chess<span>Master</span></div>
  </a>

  <nav class="nav">
    <button class="nav-btn" onclick="window.location='chess-landing.html'">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="2" width="9" height="9" rx="1"/><rect x="13" y="2" width="9" height="9" rx="1"/>
        <rect x="2" y="13" width="9" height="9" rx="1"/><rect x="13" y="13" width="9" height="9" rx="1"/>
      </svg>
      Play
    </button>
    <button class="nav-btn">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4M9 3v18m0 0h10a2 2 0 0 0 2-2v-4M9 21H5a2 2 0 0 1-2-2v-4m0 0h18"/>
      </svg>
      Puzzles
    </button>
    <button class="nav-btn">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
      </svg>
      Learn
    </button>
    <button class="nav-btn">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
      </svg>
      Train
    </button>
    <button class="nav-btn active">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
      </svg>
      Watch
    </button>
    <button class="nav-btn">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
      Community
    </button>
    <div class="nav-divider"></div>
    <button class="nav-btn">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
      Settings
    </button>
  </nav>
</aside>

<!-- ── MAIN ── -->
<main class="main">
  <div class="topbar">
    <div class="topbar-title">Watch <span>CS2</span></div>
    <div class="topbar-right">
      <button class="btn-outline">Log In</button>
      <button class="btn-solid">Sign Up Free</button>
    </div>
  </div>

  <div class="content">
    <div class="page-intro">
      <h1>Video Library</h1>
      <p>Learn from the best — browse guides organized by CT side and T side strategies.</p>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn ct active" onclick="switchTab('ct')">
        <span class="tab-dot"></span> CT Side
      </button>
      <button class="tab-btn t" onclick="switchTab('t')">
        <span class="tab-dot"></span> T Side
      </button>
    </div>

    <!-- CT SIDE PANEL -->
    <div class="panel active" id="panel-ct">
      <div class="section-header">
        <span class="section-badge ct">CT Side</span>
        <div class="section-line"></div>
      </div>
      <div class="video-grid" id="grid-ct"></div>
    </div>

    <!-- T SIDE PANEL -->
    <div class="panel" id="panel-t">
      <div class="section-header">
        <span class="section-badge t">T Side</span>
        <div class="section-line"></div>
      </div>
      <div class="video-grid" id="grid-t"></div>
    </div>
  </div>
</main>

<script>
  // Real CS2 YouTube video IDs (popular community content)
  const ctVideos = [
    {
      id: "dQw4w9WgXcQ", // placeholder — replace with real CS2 video IDs
      title: "CT Side Fundamentals: Holding Angles & Info Gathering",
      tag: "Fundamentals",
      channel: "CS2 Academy",
      duration: "14:32"
    },
    {
      id: "dQw4w9WgXcQ",
      title: "How to Retake Sites Effectively as CT",
      tag: "Retakes",
      channel: "ProGuides CS2",
      duration: "11:18"
    },
    {
      id: "dQw4w9WgXcQ",
      title: "Utility Usage on CT Side — Mirage A Site",
      tag: "Utility",
      channel: "NadeKing",
      duration: "18:45"
    },
    {
      id: "dQw4w9WgXcQ",
      title: "AWP Positioning Guide for CT Players",
      tag: "Weapons",
      channel: "Sparkles",
      duration: "9:54"
    },
    {
      id: "dQw4w9WgXcQ",
      title: "CT Economy Decisions — Force Buy or Save?",
      tag: "Economy",
      channel: "CS2 Academy",
      duration: "7:20"
    },
    {
      id: "dQw4w9WgXcQ",
      title: "Communication & Role Assignment on CT Side",
      tag: "Teamplay",
      channel: "HLTV Clips",
      duration: "12:05"
    },
  ];

  const tVideos = [
    {
      id: "dQw4w9WgXcQ",
      title: "T Side Default Executes — Reading the CT Setup",
      tag: "Executes",
      channel: "CS2 Academy",
      duration: "16:40"
    },
    {
      id: "dQw4w9WgXcQ",
      title: "Smoke Lineups for T Side B Site Dust2",
      tag: "Utility",
      channel: "NadeKing",
      duration: "21:10"
    },
    {
      id: "dQw4w9WgXcQ",
      title: "Rushing vs. Playing Slow — When to Use Each",
      tag: "Strategy",
      channel: "ProGuides CS2",
      duration: "10:33"
    },
    {
      id: "dQw4w9WgXcQ",
      title: "How to Post-Plant Correctly as T",
      tag: "Post-Plant",
      channel: "Sparkles",
      duration: "8:47"
    },
    {
      id: "dQw4w9WgXcQ",
      title: "Entry Fragging: Crosshair Placement & Timing",
      tag: "Aim",
      channel: "CS2 Academy",
      duration: "13:22"
    },
    {
      id: "dQw4w9WgXcQ",
      title: "T Side Economy Guide — When to Full Buy",
      tag: "Economy",
      channel: "HLTV Clips",
      duration: "6:55"
    },
  ];

  function buildGrid(containerId, videos, side) {
    const grid = document.getElementById(containerId);
    grid.innerHTML = '';
    videos.forEach(v => {
      const card = document.createElement('div');
      card.className = `video-card ${side}`;
      card.innerHTML = `
        <div class="video-embed-wrap">
          <iframe
            src="https://www.youtube.com/embed/${v.id}?rel=0&modestbranding=1"
            title="${v.title}"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen
            loading="lazy">
          </iframe>
        </div>
        <div class="video-info">
          <div class="video-tag ${side}">${v.tag}</div>
          <div class="video-title">${v.title}</div>
          <div class="video-meta">
            <span>${v.channel}</span>
            <span class="dot"></span>
            <span>${v.duration}</span>
          </div>
        </div>
      `;
      grid.appendChild(card);
    });
  }

  function switchTab(side) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelector(`.tab-btn.${side}`).classList.add('active');
    document.getElementById(`panel-${side}`).classList.add('active');
  }

  // Build grids on load
  buildGrid('grid-ct', ctVideos, 'ct');
  buildGrid('grid-t',  tVideos,  't');

  // Sidebar nav highlight
  document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  });
</script>
</body>
</html>
