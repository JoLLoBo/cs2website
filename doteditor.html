<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess.com Clone • Sidebar + Lessons</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: #0f0f0f; color: #e0e0e0; overflow: hidden; height: 100vh; }

        /* LEFT SIDEBAR */
        .sidebar { position: fixed; top: 0; left: 0; width: 260px; height: 100vh; background: #18181b; border-right: 1px solid #27272a; display: flex; flex-direction: column; z-index: 1000; box-shadow: 4px 0 12px rgba(0,0,0,0.3); }
        .logo { padding: 24px 20px 16px; font-size: 28px; font-weight: 700; letter-spacing: -1px; color: #fff; border-bottom: 1px solid #27272a; display: flex; align-items: center; gap: 8px; }
        .logo::before { content: "♟️"; font-size: 32px; }
        .nav { flex: 1; padding: 12px 0; }
        .nav-item { position: relative; cursor: pointer; }
        .nav-button { display: flex; align-items: center; gap: 16px; padding: 16px 24px; font-size: 17px; font-weight: 500; color: #e0e0e0; text-decoration: none; transition: all 0.2s cubic-bezier(0.4,0,0.2,1); border: none; background: transparent; width: 100%; text-align: left; }
        .nav-button:hover { background: #27272a; color: #ffffff; }
        .nav-button:hover .icon { transform: scale(1.15); }
        .icon { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; font-size: 22px; transition: transform 0.2s; }
        .submenu { display: none; position: absolute; top: 0; left: 100%; margin-left: -8px; width: 260px; background: #27272a; border-radius: 8px; box-shadow: 8px 8px 20px rgba(0,0,0,0.4); padding: 8px 0; z-index: 2000; opacity: 0; transform: translateX(-10px); transition: all 0.25s cubic-bezier(0.4,0,0.2,1); }
        .nav-item:hover .submenu { display: block; opacity: 1; transform: translateX(0); }
        .submenu-item { display: block; padding: 14px 24px; color: #e0e0e0; text-decoration: none; font-size: 16px; font-weight: 500; transition: all 0.2s; }
        .submenu-item:hover { background: #3b3b40; padding-left: 32px; color: #fff; }
        .submenu-divider { height: 1px; background: #3b3b40; margin: 8px 16px; }

        /* MAIN CONTENT AREA */
        .main { margin-left: 260px; height: 100vh; background: linear-gradient(145deg, #1a1a1e, #111113); overflow-y: auto; padding: 40px; }
        .lessons-page, .puzzle-page, .editor-page { max-width: 1100px; margin: 0 auto; }
        .lessons-header { margin-bottom: 32px; }
        .lessons-header h1 { font-size: 32px; font-weight: 600; color: #fff; }
        .breadcrumb { color: #58c2f2; font-size: 15px; margin-bottom: 8px; }
        .side-selector { display: flex; gap: 12px; margin-bottom: 24px; border-bottom: 2px solid #27272a; padding-bottom: 16px; }
        .side-btn { flex: 1; padding: 16px 24px; font-size: 18px; font-weight: 600; background: #27272a; color: #e0e0e0; border: none; border-radius: 8px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .side-btn.active { background: #58c2f2; color: #000; transform: scale(1.03); }
        .side-btn.ct::before { content: "🛡️"; }
        .side-btn.t::before { content: "🔥"; }
        .phase-selector { display: flex; gap: 12px; margin-bottom: 32px; }
        .phase-btn { padding: 12px 28px; background: #27272a; color: #e0e0e0; border: none; border-radius: 9999px; font-size: 15px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
        .phase-btn.active { background: #58c2f2; color: #000; }
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; }
        .video-card { background: #27272a; border-radius: 12px; overflow: hidden; transition: transform 0.2s, box-shadow 0.2s; cursor: pointer; }
        .video-card:hover { transform: translateY(-4px); box-shadow: 0 12px 24px rgba(88,194,242,0.2); }
        .thumbnail { height: 180px; background: #1a1a1e; position: relative; display: flex; align-items: center; justify-content: center; font-size: 48px; color: #58c2f2; overflow: hidden; }
        .thumbnail img { width: 100%; height: 100%; object-fit: cover; }
        .thumbnail::after { content: "▶"; position: absolute; font-size: 42px; background: rgba(0,0,0,0.6); width: 64px; height: 64px; border-radius: 50%; display: flex; align-items: center; justify-content: center; opacity: 0.9; z-index: 2; }
        .video-info { padding: 16px; }
        .video-info h3 { font-size: 17px; line-height: 1.3; margin-bottom: 6px; color: #fff; }
        .video-info .duration { font-size: 13px; color: #58c2f2; font-weight: 500; }
        .video-info p { font-size: 14px; color: #aaa; margin-top: 8px; line-height: 1.4; }
        .empty-state { text-align: center; padding: 80px 20px; color: #666; }
        .back-btn { display: inline-flex; align-items: center; gap: 8px; background: #27272a; color: #fff; padding: 10px 20px; border-radius: 8px; font-size: 15px; margin-bottom: 24px; cursor: pointer; transition: 0.2s; }
        .back-btn:hover { background: #58c2f2; color: #000; }

        /* PUZZLE PAGE STYLES */
        .map-container { position: relative; display: block; margin: 30px auto; max-width: 820px; background: #111113; padding: 20px; border: 6px solid #27272a; border-radius: 16px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .map-container img { width: 100%; display: block; border-radius: 8px; filter: brightness(1.25) contrast(1.15); }
        .blue-dot { position: absolute; width: 24px; height: 24px; background: #58c2f2; color: #000; border: 3px solid #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 15px; box-shadow: 0 0 0 5px rgba(88,194,242,0.4); cursor: pointer; transition: all 0.2s cubic-bezier(0.4,0,0.2,1); z-index: 10; transform: translate(-50%, -50%); }
        .blue-dot:hover { transform: translate(-50%, -50%) scale(1.15); box-shadow: 0 0 0 8px rgba(88,194,242,0.6); }
        .blue-dot.correct { background: #f87171; }
        .blue-dot.wrong { background: #4ade80; }
        #puzzle-feedback { min-height: 100px; margin-top: 20px; }

        /* LEVEL SELECTOR */
        .level-preview { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; margin: 40px auto; max-width: 820px; }
        .level-card { background: #27272a; border-radius: 12px; padding: 24px 16px; text-align: center; font-size: 28px; font-weight: 700; cursor: pointer; transition: all 0.2s; position: relative; }
        .level-card:hover { transform: translateY(-4px); box-shadow: 0 8px 20px rgba(88,194,242,0.3); }
        .level-card.locked { background: #1f1f23; color: #555; cursor: not-allowed; }
        .level-card.locked::after { content: "🔒"; position: absolute; top: 12px; right: 12px; font-size: 18px; }
        .level-card.unlocked { background: #58c2f2; color: #000; }
        .level-card .level-number { font-size: 42px; line-height: 1; }
        .level-card .level-title { font-size: 14px; margin-top: 8px; opacity: 0.8; }

        /* DOT EDITOR BAR */
        .edit-mode-bar { background: #27272a; padding: 12px; border-radius: 12px; margin-bottom: 16px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
        .coord-display { background: #111; padding: 8px 16px; border-radius: 8px; font-family: monospace; font-size: 15px; }
    </style>
</head>
<body>
    <!-- LEFT SIDEBAR -->
    <div class="sidebar">
        <div class="logo">chess<span style="color: #58c2f2;">.</span>com</div>
        <nav class="nav">
            <!-- PUZZLES -->
            <div class="nav-item">
                <button class="nav-button">
                    <span class="icon">🧩</span>
                    <span>Puzzles</span>
                </button>
                <div class="submenu">
                    <a href="#" onclick="loadDailyPuzzle(); return false;" class="submenu-item">Daily Puzzle</a>
                    <a href="#" onclick="loadEditor(); return false;" class="submenu-item">Dot Editor</a>
                    <a href="#" class="submenu-item">Puzzle Rush</a>
                    <a href="#" class="submenu-item">Rated Puzzles</a>
                    <a href="#" class="submenu-item">Puzzle Streak</a>
                    <div class="submenu-divider"></div>
                    <a href="#" class="submenu-item">Puzzle History</a>
                    <a href="#" class="submenu-item">Custom Puzzles</a>
                </div>
            </div>
            <!-- LEARN, TRAIN, WATCH, COMMUNITY (unchanged) -->
            <div class="nav-item">
                <button class="nav-button"><span class="icon">📚</span><span>Learn</span></button>
                <div class="submenu">
                    <a href="#" onclick="loadLessons(); return false;" class="submenu-item">Lessons</a>
                    <a href="#" class="submenu-item">Courses</a>
                    <a href="#" class="submenu-item">Openings</a>
                    <a href="#" class="submenu-item">Tactics Trainer</a>
                    <div class="submenu-divider"></div>
                    <a href="#" class="submenu-item">Opening Explorer</a>
                    <a href="#" class="submenu-item">Chess Fundamentals</a>
                </div>
            </div>
            <div class="nav-item"><button class="nav-button"><span class="icon">⚔️</span><span>Train</span></button><div class="submenu">...</div></div>
            <div class="nav-item"><button class="nav-button"><span class="icon">📺</span><span>Watch</span></button><div class="submenu">...</div></div>
            <div class="nav-item"><button class="nav-button"><span class="icon">👥</span><span>Community</span></button><div class="submenu">...</div></div>
        </nav>
    </div>

    <div class="main" id="main-content"></div>

    <script>
        // === YOUR EXACT VIDEO DATA ===
        const videoData = {
            "ct_early": [ /* your full ct_early videos */ ],
            "ct_mid": [ /* your full ct_mid videos */ ],
            "ct_afterplant": [ /* your full ct_afterplant videos */ ],
            "t_early": [ /* your full t_early videos */ ],
            "t_mid": [ /* your full t_mid videos */ ],
            "t_afterplant": [ /* your full t_afterplant videos */ ]
        };

        // === YOUR EXACT PUZZLE DATA ===
        const puzzleData = {
            "ct_early": { levels: [ /* your full ct_early levels */ ] },
            "ct_mid": { levels: [ /* your full ct_mid levels */ ] },
            "ct_afterplant": { levels: Array.from({length: 10}, (_, i) => ({ level: i+1, question: `CT After Plant Level ${i+1} (coming soon)`, imageSrc: "./mapImages/ancientMap.webp", dots: [] })) },
            "t_early": { levels: Array.from({length: 10}, (_, i) => ({ level: i+1, question: `T Early Round Level ${i+1} (coming soon)`, imageSrc: "./mapImages/ancientMap.webp", dots: [] })) },
            "t_mid": { levels: Array.from({length: 10}, (_, i) => ({ level: i+1, question: `T Mid Round Level ${i+1} (coming soon)`, imageSrc: "./mapImages/ancientMap.webp", dots: [] })) },
            "t_afterplant": { levels: Array.from({length: 10}, (_, i) => ({ level: i+1, question: `T After Plant Level ${i+1} (coming soon)`, imageSrc: "./mapImages/ancientMap.webp", dots: [] })) }
        };

        let currentSide = 'ct';
        let currentPhase = 'early';
        let currentPuzzleSide = 'ct';
        let currentPuzzlePhase = 'early';
        let currentPuzzleLevel = 1;
        let currentPuzzle = null;
        let editMode = false;
        let editorDots = [];   // For the new Editor page

        let unlockedLevels = { "ct_early": 1, "ct_mid": 1, "ct_afterplant": 1, "t_early": 1, "t_mid": 1, "t_afterplant": 1 };

        function getCategoryKey() { return `${currentPuzzleSide}_${currentPuzzlePhase}`; }

        // === ALL YOUR ORIGINAL FUNCTIONS (unchanged) ===
        // (renderVideos, selectSide, selectPhase, playPlaceholderVideo, loadLessons, loadDailyPuzzle, selectPuzzleSide, selectPuzzlePhase, showLevelPreview, loadPuzzleLevel, renderPuzzleDots, handleDotClick, goToNextLevel, loadHome)

        // === NEW: DOT EDITOR PAGE (unchanged except copyEditorData) ===
        window.loadEditor = function() {
            const main = document.getElementById('main-content');
            main.innerHTML = `
                <div class="editor-page">
                    <div onclick="loadHome()" class="back-btn">← Back to Home</div>
                    <div class="lessons-header">
                        <div class="breadcrumb">Tools &nbsp;›&nbsp; Dot Editor</div>
                        <h1>Dot Editor – Left click: CT (blue) • Right click: T (orange)</h1>
                    </div>
                    <div class="edit-mode-bar">
                        <button onclick="copyEditorData()" style="background:#58c2f2;color:#000;border:none;padding:10px 20px;border-radius:9999px;font-weight:600;cursor:pointer;">📋 Copy Full Level Object</button>
                        <div class="coord-display" id="live-coords">Move mouse over map → live coordinates</div>
                    </div>
                    <div class="map-container" id="map-container">
                        <img src="./mapImages/ancientMap.webp" alt="CS2 Map Puzzle">
                    </div>
                    <p style="text-align:center;margin-top:20px;opacity:0.7;">Click anywhere to add a dot • Drag to move • Copy when finished</p>
                </div>
            `;
            editorDots = [];
            enableEditorClick();
        };

        function enableEditorClick() {
                const mapContainer = document.getElementById('map-container');
                const coordsDisplay = document.getElementById('live-coords');

                mapContainer.style.cursor = 'crosshair';

                mapContainer.onmousemove = (e) => {
                    const rect = mapContainer.getBoundingClientRect();
                    const x = ((e.clientX - rect.left) / rect.width * 100).toFixed(1);
                    const y = ((e.clientY - rect.top) / rect.height * 100).toFixed(1);
                    coordsDisplay.textContent = `X: ${x}%   Y: ${y}%`;
                };

                // Left click: add CT dot (blue)
                mapContainer.addEventListener('click', (e) => {
                    const rect = mapContainer.getBoundingClientRect();
                    const left = ((e.clientX - rect.left) / rect.width * 100).toFixed(1) + '%';
                    const top = ((e.clientY - rect.top) / rect.height * 100).toFixed(1) + '%';

                    const newId = editorDots.length + 1;
                    editorDots.push({
                        id: newId,
                        type: 'ct',
                        left: left,
                        top: top,
                        correct: false,
                        expl: "New CT dot – edit later"
                    });
                    renderEditorDots();
                });

                // Right click: add T dot (orange)
                mapContainer.addEventListener('contextmenu', (e) => {
                    e.preventDefault(); // Prevent context menu
                    const rect = mapContainer.getBoundingClientRect();
                    const left = ((e.clientX - rect.left) / rect.width * 100).toFixed(1) + '%';
                    const top = ((e.clientY - rect.top) / rect.height * 100).toFixed(1) + '%';

                    const newId = editorDots.length + 1;
                    editorDots.push({
                        id: newId,
                        type: 't',
                        left: left,
                        top: top,
                        correct: false,
                        expl: "New T dot – edit later"
                    });
                    renderEditorDots();
                    return false;
                });
            }

        function renderEditorDots() {
                const container = document.getElementById('map-container');
                container.querySelectorAll('.blue-dot').forEach(el => el.remove());

                editorDots.forEach(dot => {
                    const dotEl = document.createElement('div');
                    dotEl.className = 'blue-dot';
                    dotEl.style.left = dot.left;
                    dotEl.style.top = dot.top;
                    dotEl.textContent = dot.id;

                    // Style based on type
                    if (dot.type === 'ct') {
                        dotEl.style.background = '#58c2f2';
                        dotEl.style.boxShadow = '0 0 0 5px rgba(88, 194, 242, 0.4)';
                    } else {
                        dotEl.style.background = '#f59e0b';
                        dotEl.style.boxShadow = '0 0 0 5px rgba(245, 158, 11, 0.4)';
                    }

                    container.appendChild(dotEl);
                });
            }

        function copyEditorData() {
                if (editorDots.length === 0) {
                    alert("Place at least one dot first!");
                    return;
                }

                const levelNum = prompt("Enter the level number (e.g. 11):", "11");
                const questionText = prompt("Enter the question for this level:", "Which of the following is the A fast info initial position?");

                let dotsStr = editorDots.map(dot =>
                    `                        { id: ${dot.id}, type: '${dot.type || 'ct'}', left: "${dot.left}", top: "${dot.top}", correct: ${dot.correct}, expl: "${dot.expl}" }`
                ).join(',\n');

                const output = `{ level: ${levelNum}, question: "${questionText}", imageSrc: "./mapImages/ancientMap.webp", dots: [\n${dotsStr}\n                    ]},\n`;

                navigator.clipboard.writeText(output).then(() => {
                    alert('✅ Copied with type included!\n\nPaste directly into any levels array in puzzleData.');
                });
            }

        console.log('%c✅ "Dot Editor" now outputs exactly the compact inline format you requested (with trailing comma).', 'color:#58c2f2; font-size:15px; font-weight:600;');
    </script>
</body>
</html>
