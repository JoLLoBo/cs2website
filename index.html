<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS2.com</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            overflow: hidden;
            height: 100vh;
        }

        /* LEFT SIDEBAR */
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 260px;
            height: 100vh;
            background: #18181b;
            border-right: 1px solid #27272a;
            display: flex;
            flex-direction: column;
            z-index: 1000;
            box-shadow: 4px 0 12px rgba(0, 0, 0, 0.3);
        }

        .logo {
            padding: 24px 20px 16px;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -1px;
            color: #fff;
            border-bottom: 1px solid #27272a;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo::before {
            content: "🧬";
            font-size: 32px;
        }

        .nav {
            flex: 1;
            padding: 12px 0;
        }

        .nav-item {
            position: relative;
            cursor: pointer;
        }

        .nav-button {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 24px;
            font-size: 17px;
            font-weight: 500;
            color: #e0e0e0;
            text-decoration: none;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
            background: transparent;
            width: 100%;
            text-align: left;
        }

        .nav-button:hover {
            background: #27272a;
            color: #ffffff;
        }

        .nav-button:hover .icon {
            transform: scale(1.15);
        }

        .icon {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            transition: transform 0.2s;
        }

        /* FIXED SUBMENU */
        .submenu {
            display: none;
            position: absolute;
            top: 0;
            left: 100%;
            margin-left: -8px;
            width: 260px;
            background: #27272a;
            border-radius: 8px;
            box-shadow: 8px 8px 20px rgba(0, 0, 0, 0.4);
            padding: 8px 0;
            z-index: 2000;
            opacity: 0;
            transform: translateX(-10px);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .nav-item:hover .submenu {
            display: block;
            opacity: 1;
            transform: translateX(0);
        }

        .submenu-item {
            display: block;
            padding: 14px 24px;
            color: #e0e0e0;
            text-decoration: none;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .submenu-item:hover {
            background: #3b3b40;
            padding-left: 32px;
            color: #fff;
        }

        .submenu-divider {
            height: 1px;
            background: #3b3b40;
            margin: 8px 16px;
        }

        /* MAIN CONTENT AREA */
        .main {
            margin-left: 260px;
            height: 100vh;
            background: linear-gradient(145deg, #1a1a1e, #111113);
            overflow-y: auto;
            padding: 40px;
        }

        .lessons-page,
        .puzzle-page {
            max-width: 1100px;
            margin: 0 auto;
        }

        .lessons-header {
            margin-bottom: 32px;
        }

        .lessons-header h1 {
            font-size: 32px;
            font-weight: 600;
            color: #fff;
        }

        .breadcrumb {
            color: #58c2f2;
            font-size: 15px;
            margin-bottom: 8px;
        }

        .side-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            border-bottom: 2px solid #27272a;
            padding-bottom: 16px;
        }

        .side-btn {
            flex: 1;
            padding: 16px 24px;
            font-size: 18px;
            font-weight: 600;
            background: #27272a;
            color: #e0e0e0;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .side-btn.active {
            background: #58c2f2;
            color: #000;
            transform: scale(1.03);
        }

        .side-btn.ct::before {
            content: "🛡️";
        }

        .side-btn.t::before {
            content: "🔥";
        }

        .phase-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
        }

        .phase-btn {
            padding: 12px 28px;
            background: #27272a;
            color: #e0e0e0;
            border: none;
            border-radius: 9999px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .phase-btn.active {
            background: #58c2f2;
            color: #000;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }

        .video-card {
            background: #27272a;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }

        .video-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(88, 194, 242, 0.2);
        }

        .thumbnail {
            height: 180px;
            background: #1a1a1e;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: #58c2f2;
            overflow: hidden;
        }

        .thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .thumbnail::after {
            content: "▶";
            position: absolute;
            font-size: 42px;
            background: rgba(0, 0, 0, 0.6);
            width: 64px;
            height: 64px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.9;
            z-index: 2;
        }

        .video-info {
            padding: 16px;
        }

        .video-info h3 {
            font-size: 17px;
            line-height: 1.3;
            margin-bottom: 6px;
            color: #fff;
        }

        .video-info .duration {
            font-size: 13px;
            color: #58c2f2;
            font-weight: 500;
        }

        .video-info p {
            font-size: 14px;
            color: #aaa;
            margin-top: 8px;
            line-height: 1.4;
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: #666;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #27272a;
            color: #fff;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 15px;
            margin-bottom: 24px;
            cursor: pointer;
            transition: 0.2s;
        }

        .back-btn:hover {
            background: #58c2f2;
            color: #000;
        }

        /* PUZZLE PAGE STYLES */
        .map-container {
            position: relative;
            display: block;
            max-width: 820px;
            background: #111113;
            padding: 20px;
            border: 6px solid #27272a;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .map-container img {
            width: 100%;
            display: block;
            border-radius: 8px;
            filter: brightness(1.25) contrast(1.15);
        }

        .blue-dot {
            position: absolute;
            width: 24px;
            height: 24px;
            background: #58c2f2;
            color: #111;
            border: 3px solid #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 15px;
            box-shadow: 0 0 0 5px rgba(88, 194, 242, 0.4);
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10;
            transform: translate(-50%, -50%);
        }

        .blue-dot:hover {
            transform: translate(-50%, -50%) scale(1.15);
            box-shadow: 0 0 0 8px rgba(88, 194, 242, 0.6);
        }

        /* Highlight colors (only applied after click) */
        .blue-dot.correct {
            background: #c084fc;
            box-shadow: 0 0 0 5px rgba(192, 132, 252, 0.6);
        }

        .blue-dot.wrong {
            background: #e8c39e;
            box-shadow: 0 0 0 5px rgba(232, 195, 158, 0.6);
        }

        /* SIDE-BY-SIDE LAYOUT FOR BOTH CORRECT AND WRONG */
        .puzzle-wrapper {
            display: flex;
            gap: 40px;
            align-items: flex-start;
            max-width: 1200px;
            margin: 0 auto;
        }

        .puzzle-feedback-side {
            flex: 0 0 520px;
            position: sticky;
            top: 40px;
            border-radius: 12px;
            padding: 28px;
            font-size: 19px;
            font-weight: 600;
        }

        #puzzle-feedback {
            min-height: 100px;
            margin-top: 20px;
        }

        /* LEVEL SELECTOR */
        .level-preview {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 16px;
            margin: 40px auto;
            max-width: 820px;
        }

        .level-card {
            background: #27272a;
            border-radius: 12px;
            padding: 24px 16px;
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .level-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(88, 194, 242, 0.3);
        }

        .level-card.locked {
            background: #1f1f23;
            color: #555;
            cursor: not-allowed;
        }

        .level-card.locked::after {
            content: "🔒";
            position: absolute;
            top: 12px;
            right: 12px;
            font-size: 18px;
        }

        .level-card.unlocked {
            background: #58c2f2;
            color: #000;
        }

        .level-card .level-number {
            font-size: 42px;
            line-height: 1;
        }

        .level-card .level-title {
            font-size: 14px;
            margin-top: 8px;
            opacity: 0.8;
        }

        /* T-SIDE ORANGE THEME (works in BOTH Lessons and Puzzles) */
        .t-side .blue-dot {
            background: #f59e0b;
            box-shadow: 0 0 0 5px rgba(245, 158, 11, 0.4);
        }

        .t-side .blue-dot.correct {
            background: #fb923c;
            box-shadow: 0 0 0 5px rgba(251, 146, 60, 0.6);
        }

        .t-side .blue-dot.wrong {
            background: #f97316;
            box-shadow: 0 0 0 5px rgba(249, 115, 22, 0.6);
        }

        .t-side .puzzle-feedback-side[style*="background:#c084fc"] {
            background: #fb923c !important;
            color: #111;
        }

        .t-side .level-card.unlocked {
            background: #f59e0b !important;
        }

        .t-side .side-btn.active {
            background: #f59e0b !important;
            color: #111;
        }

        .t-side .phase-btn.active {
            background: #f59e0b !important;
            color: #111;
        }

        .t-side .lessons-header h1,
        .t-side .breadcrumb {
            color: #f59e0b !important;
        }

        .t-side .back-btn:hover {
            background: #f59e0b;
            color: #111;
        }

        /* CT side remains blue (default) */
        .lessons-header h1,
        .breadcrumb {
            color: #58c2f2;
        }

        .back-btn:hover {
            background: #58c2f2;
            color: #111;
        }

        /* Video card hover shadow respects the blue/orange theme */
        .video-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(88, 194, 242, 0.2);
        }

        .t-side .video-card:hover {
            box-shadow: 0 12px 24px rgba(245, 158, 11, 0.3);
        }

        /* ZONE EDITOR STYLES */
        .zone-editor {
            max-width: 1100px;
            margin: 0 auto;
        }

        .zone-canvas-container {
            position: relative;
            display: inline-block;
            border: 6px solid #27272a;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .zone-canvas-container canvas {
            position: absolute;
            top: 0;
            left: 0;
            cursor: crosshair;
        }

        .smoke-cloud {
            position: absolute;
            width: 45px;
            height: 45px;
            transform: translate(-50%, -50%);
            z-index: 5;
            pointer-events: none;
            filter: drop-shadow(0 3px 4px rgba(0, 0, 0, 0.3));
        }

        .smoke-cloud::before,
        .smoke-cloud::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            background: #a0a0a0;
        }

        .smoke-cloud::before {
            width: 28px;
            height: 28px;
            top: 3px;
            left: 0;
            box-shadow:
                16px 6px 0 #909090,
                32px 3px 0 #888,
                9px 20px 0 #9a9a9a,
                25px 22px 0 #858585,
                -3px 12px 0 #b0b0b0;
        }

        .smoke-cloud::after {
            width: 35px;
            height: 35px;
            top: 0;
            left: 6px;
            background: radial-gradient(circle at 30% 30%, #b8b8b8, #7a7a7a);
            opacity: 0.95;
        }

        /* Flash – softer, less bright star */
        .flash-bang {
            position: absolute;
            width: 28px;
            height: 28px;
            transform: translate(-50%, -50%);
            z-index: 5;
            pointer-events: none;
            filter: drop-shadow(0 0 4px rgba(255, 255, 255, 0.6));
        }

        .flash-bang::before,
        .flash-bang::after,
        .flash-bang .star-arm {
            content: '';
            position: absolute;
            background: #f5f5f5;
            border-radius: 2px;
            box-shadow: 0 0 6px #fef08a;
        }

        .flash-bang::before {
            width: 5px;
            height: 26px;
            top: 1px;
            left: 12px;
            transform: rotate(0deg);
        }

        .flash-bang::after {
            width: 5px;
            height: 26px;
            top: 1px;
            left: 12px;
            transform: rotate(90deg);
        }

        .flash-bang .star-arm {
            width: 4px;
            height: 22px;
            top: 3px;
            left: 12px;
            transform: rotate(45deg);
        }

        .flash-bang .star-arm:nth-child(2) {
            transform: rotate(-45deg);
        }

        /* Molotov – sharp, flickering flame */
        .molotov-fire {
            position: absolute;
            width: 50px;
            height: 50px;
            transform: translate(-50%, -50%);
            z-index: 5;
            pointer-events: none;
            filter: drop-shadow(0 0 8px #f97316);
        }

        .molotov-fire::before,
        .molotov-fire::after {
            content: '';
            position: absolute;
            border-radius: 50% 20% 50% 20%;
            background: #f97316;
            box-shadow: 0 0 10px #fb923c;
        }

        .molotov-fire::before {
            width: 18px;
            height: 32px;
            top: 8px;
            left: 12px;
            transform: rotate(-20deg);
            background: linear-gradient(45deg, #fffbeb, #f97316 60%, #c2410c);
            border-radius: 40% 20% 40% 20%;
        }

        .molotov-fire::after {
            width: 22px;
            height: 36px;
            top: 4px;
            left: 20px;
            transform: rotate(25deg);
            background: linear-gradient(135deg, #fef08a, #ea580c 70%, #9a3412);
            border-radius: 30% 50% 30% 50%;
            box-shadow: 0 0 12px #fbbf24;
        }

        /* Additional flame tongue */
        .molotov-fire .flame-tongue {
            position: absolute;
            width: 14px;
            height: 28px;
            top: 12px;
            left: 8px;
            transform: rotate(-40deg);
            background: linear-gradient(45deg, #fffbeb, #fb923c 80%, #b91c1c);
            border-radius: 50% 20% 50% 20%;
            box-shadow: 0 0 8px #f97316;
        }

        .molotov-fire .flame-tongue:nth-child(2) {
            width: 12px;
            height: 24px;
            top: 6px;
            left: 30px;
            transform: rotate(45deg);
            background: linear-gradient(135deg, #fef08a, #f97316 80%, #7c2d12);
        }
    </style>
</head>

                if (ids.size >= 2) drawLinesForGroup(ids, '#a78bfa');

        function drawLinesForGroup(dotIdSet, color) {
            const dotIds = Array.from(dotIdSet);
            const dotElements = dotIds.map(id => {
                const el = Array.from(document.querySelectorAll('.blue-dot')).find(el => parseInt(el.textContent) === id);
                return el ? { id, el } : null;
            }).filter(item => item);

            for (let i = 0; i < dotElements.length; i++) {
                for (let j = i + 1; j < dotElements.length; j++) {
                    const dotA = dotElements[i];
                    const dotB = dotElements[j];
                    const leftA = parseFloat(dotA.el.style.left) || 0;
                    const topA = parseFloat(dotA.el.style.top) || 0;
                    const leftB = parseFloat(dotB.el.style.left) || 0;
                    const topB = parseFloat(dotB.el.style.top) || 0;

                    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    line.setAttribute('x1', `${leftA}%`);
                    line.setAttribute('y1', `${topA}%`);
                    line.setAttribute('x2', `${leftB}%`);
                    line.setAttribute('y2', `${topB}%`);
                    line.setAttribute('stroke', color);
                    line.setAttribute('stroke-width', '4');
                    line.setAttribute('stroke-linecap', 'round');
                    line.style.opacity = '0.9';
                    line.style.filter = `drop-shadow(0 0 4px ${color})`;
                    setupLinesSvg.appendChild(line);
                }
            }
        }

        window.generateNewTAfterplantPuzzle = function () {
            setupActive = false;
            activeSetupDotIds.clear();
            setupAnchorDotId = null;
            setupPartnerIds.clear();
            setupSelectionMode = false;
            pushActive = false;
            activePushDotIds.clear();
            pushAnchorDotId = null;
            pushPartnerIds.clear();
            pushSelectionMode = false;

            const container = document.getElementById('puzzle-container');

            const numCT = Math.floor(Math.random() * 5) + 1;
            const numT = Math.floor(Math.random() * 5) + 1;
            const numBomb = 1;

            function randomInZone(zone) {
                const left = parseFloat(zone.left) + Math.random() * parseFloat(zone.width);
                const top = parseFloat(zone.top) + Math.random() * parseFloat(zone.height);
                return { left: left.toFixed(1) + '%', top: top.toFixed(1) + '%' };
            }

            function clampToZone(pos, zone) {
                let l = parseFloat(pos.left);
                let t = parseFloat(pos.top);
                const zoneLeft = parseFloat(zone.left);
                const zoneTop = parseFloat(zone.top);
                const zoneRight = zoneLeft + parseFloat(zone.width);
                const zoneBottom = zoneTop + parseFloat(zone.height);

                l = Math.max(zoneLeft, Math.min(l, zoneRight));
                t = Math.max(zoneTop, Math.min(t, zoneBottom));

                return { left: l.toFixed(1) + '%', top: t.toFixed(1) + '%' };
            }

            const dots = [];
            let id = 1;

            function placeDot(type, zones, color) {
                const zone = zones[Math.floor(Math.random() * zones.length)] || { left: "20%", top: "20%", width: "20%", height: "20%" };
                let pos = randomInZone(zone);

                let attempts = 0;
                while (attempts < 2500) {
                    attempts++;

                    const candidate = { id: id, type: type, left: pos.left, top: pos.top, color: color };

                    // Check overlap
                    let collision = false;
                    for (let existing of dots) {
                        const dx = parseFloat(candidate.left) - parseFloat(existing.left);
                        const dy = parseFloat(candidate.top) - parseFloat(existing.top);
                        if (Math.sqrt(dx * dx + dy * dy) < 28) {   // 28% = guaranteed zero contact
                            collision = true;
                            break;
                        }
                    }

                    if (!collision) {
                        dots.push(candidate);
                        id++;
                        return;
                    }

                    // ADJUST: push away from closest dot, then clamp back inside the original zone
                    let closest = dots[0];
                    let minDist = Infinity;
                    for (let existing of dots) {
                        const dx = parseFloat(candidate.left) - parseFloat(existing.left);
                        const dy = parseFloat(candidate.top) - parseFloat(existing.top);
                        const d = Math.sqrt(dx * dx + dy * dy);
                        if (d < minDist) {
                            minDist = d;
                            closest = existing;
                        }
                    }

                    const dx = parseFloat(candidate.left) - parseFloat(closest.left);
                    const dy = parseFloat(candidate.top) - parseFloat(closest.top);
                    const len = Math.sqrt(dx * dx + dy * dy) || 1;
                    const push = 32;   // strong push

                    pos.left = (parseFloat(candidate.left) + (dx / len) * push).toFixed(1) + '%';
                    pos.top = (parseFloat(candidate.top) + (dy / len) * push).toFixed(1) + '%';

                    // Clamp back inside the original zone so it never leaves the allowed area
                    pos = clampToZone(pos, zone);
                }

                // fallback
                dots.push({ id: id++, type: type, left: pos.left, top: pos.top, color: color });
            }

            // Place sequentially (CT first = lowest numbers)
            for (let i = 0; i < numCT; i++)   placeDot('ct', spawnConfig.ctPlayers.zones, '#58c2f2');
            for (let i = 0; i < numT; i++)    placeDot('t', spawnConfig.tPlayers.zones, '#f59e0b');
            for (let i = 0; i < numBomb; i++) placeDot('bomb', spawnConfig.bomb.zones, '#eab308');

            // Add click listener on map container to clear selection when clicking empty area
            mapContainer.addEventListener('click', (e) => {

        };

                let newLeft = (mouseX / rect.width) * 100;

                newLeft = Math.max(0, Math.min(100, newLeft));

            const img = document.getElementById('zone-map');
            const canvas = document.getElementById('zone-canvas');
            const ctx = canvas.getContext('2d');

            img.onload = () => {
                canvas.width = img.offsetWidth;
                canvas.height = img.offsetHeight;
                setupCanvasDrawing(ctx, canvas);
            };
            if (img.complete) {
                canvas.width = img.offsetWidth;
                canvas.height = img.offsetHeight;
                setupCanvasDrawing(ctx, canvas);
            }
        };

        function setDrawingCategory(cat) {
            currentDrawingCategory = cat;
            document.getElementById('btn-ct').style.opacity = cat === 'ct' ? '1' : '0.6';
            document.getElementById('btn-t').style.opacity = cat === 't' ? '1' : '0.6';
            document.getElementById('btn-bomb').style.opacity = cat === 'bomb' ? '1' : '0.6';
        }

        function setupCanvasDrawing(ctx, canvas) {
            let startX = 0, startY = 0;

            canvas.addEventListener('mousedown', e => {
                isDrawing = true;
                const rect = canvas.getBoundingClientRect();
                startX = e.clientX - rect.left;
                startY = e.clientY - rect.top;
            });

            canvas.addEventListener('mousemove', e => {
                if (!isDrawing) return;
                const rect = canvas.getBoundingClientRect();
                const currentX = e.clientX - rect.left;
                const currentY = e.clientY - rect.top;

                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // Redraw all saved zones
                redrawAllZones(ctx);

                // Draw temp rectangle
                ctx.strokeStyle = currentDrawingCategory === 'ct' ? '#58c2f2' : currentDrawingCategory === 't' ? '#f59e0b' : '#eab308';
                ctx.lineWidth = 4;
                ctx.setLineDash([6, 4]);
                ctx.strokeRect(startX, startY, currentX - startX, currentY - startY);
                ctx.setLineDash([]);
            });

            canvas.addEventListener('mouseup', e => {
                if (!isDrawing) return;
                isDrawing = false;

                const rect = canvas.getBoundingClientRect();
                const endX = e.clientX - rect.left;
                const endY = e.clientY - rect.top;

                const x = Math.min(startX, endX);
                const y = Math.min(startY, endY);
                const w = Math.abs(endX - startX);
                const h = Math.abs(endY - startY);

                if (w > 10 && h > 10) {
                    const zone = {
                        left: (x / canvas.width * 100).toFixed(1) + '%',
                        top: (y / canvas.height * 100).toFixed(1) + '%',
                        width: (w / canvas.width * 100).toFixed(1) + '%',
                        height: (h / canvas.height * 100).toFixed(1) + '%'
                    };
                    zoneEditorData[currentDrawingCategory].push(zone);
                    updateZoneList();
                }

                ctx.clearRect(0, 0, canvas.width, canvas.height);
                redrawAllZones(ctx);
            });
        }

        function redrawAllZones(ctx) {
            const colors = { ct: '#58c2f2', t: '#f59e0b', bomb: '#eab308' };

            Object.keys(zoneEditorData).forEach(cat => {
                ctx.strokeStyle = colors[cat];
                ctx.lineWidth = 4;
                ctx.setLineDash([6, 4]);
                zoneEditorData[cat].forEach(zone => {
                    const x = parseFloat(zone.left) / 100 * ctx.canvas.width;
                    const y = parseFloat(zone.top) / 100 * ctx.canvas.height;
                    const w = parseFloat(zone.width) / 100 * ctx.canvas.width;
                    const h = parseFloat(zone.height) / 100 * ctx.canvas.height;
                    ctx.strokeRect(x, y, w, h);
                });
            });
            ctx.setLineDash([]);
        }

        function updateZoneList() {
            const list = document.getElementById('zone-list');
            let html = '';
            Object.keys(zoneEditorData).forEach(cat => {
                const label = cat === 'ct' ? 'CT Players' : cat === 't' ? 'T Players' : 'Bomb';
                const color = cat === 'ct' ? '#58c2f2' : cat === 't' ? '#f59e0b' : '#eab308';
                html += `<div style="margin-bottom:16px;"><strong style="color:${color}">${label}</strong> (${zoneEditorData[cat].length} zones)</div>`;
                zoneEditorData[cat].forEach((z, i) => {
                    html += `<div style="font-size:13px; background:#1a1a1e; padding:8px 12px; margin-bottom:4px; border-radius:6px;">
                        ${z.left}, ${z.top} → ${z.width}×${z.height}
                        <span onclick="deleteZone('${cat}', ${i}); event.stopImmediatePropagation();" style="float:right; color:#f44; cursor:pointer;">×</span>
                    </div>`;
                });
            });
            if (html === '') html = '<p style="color:#666; text-align:center; padding:40px 0;">No zones defined yet.<br>Draw rectangles on the map.</p>';
            list.innerHTML = html;
        }

        function deleteZone(cat, index) {
            zoneEditorData[cat].splice(index, 1);
            updateZoneList();
            const canvas = document.getElementById('zone-canvas');
            if (canvas) {
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                redrawAllZones(ctx);
            }
        }

        function clearAllZones() {
            zoneEditorData = { ct: [], t: [], bomb: [] };
            updateZoneList();
            const canvas = document.getElementById('zone-canvas');
            if (canvas) {
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }
        }

        window.finishZoneEditor = function () {
            // Copy the zones into spawnConfig
            spawnConfig.ctPlayers.zones = [...zoneEditorData.ct];
            spawnConfig.tPlayers.zones = [...zoneEditorData.t];
            spawnConfig.bomb.zones = [...zoneEditorData.bomb];

            const json = JSON.stringify(spawnConfig, null, 4);

            const main = document.getElementById('main-content');
            main.innerHTML = `
                <div class="zone-editor" style="text-align:center;">
                    <div onclick="loadHome()" class="back-btn">← Back to Home</div>
                    <h1 style="color:#58c2f2;">✅ Zones Saved!</h1>
                    <p style="margin:30px 0 20px; color:#aaa;">Copy the code below and replace the <strong>spawnConfig</strong> object in your script.</p>
                    <pre style="background:#18181b; padding:24px; border-radius:12px; text-align:left; overflow:auto; max-height:420px; font-size:13px; line-height:1.4; white-space:pre;">const spawnConfig = ${json};</pre>
                    <button onclick="loadDailyPuzzle()" style="margin-top:30px; background:#58c2f2; color:#000; padding:16px 40px; font-size:18px; font-weight:600; border:none; border-radius:9999px;">Back to Puzzles</button>
                </div>
            `;

            console.log('%c✅ Zone Editor finished – spawnConfig ready to copy:', 'color:#58c2f2; font-weight:600;');
            console.log(json);
        };

        window.loadPuzzleLevel = function (level) {
            lastClickedDotId = null;
            currentPuzzleLevel = level;
            const key = getCategoryKey();
            const categoryData = puzzleData[key];
            if (!categoryData || !categoryData.levels) {
                showLevelPreview();
                return;
            }
            currentPuzzle = categoryData.levels.find(l => l.level === level);
            if (!currentPuzzle) {
                showLevelPreview();
                return;
            }

            // Set up multiple-choice if applicable
            multipleChoiceMode = currentPuzzle.type === 'multipleChoice' || false;
            if (multipleChoiceMode) {
                multipleChoiceCorrect = currentPuzzle.correctAnswer || '';
                multipleChoiceOptions = currentPuzzle.options || [];
            }

            // Set up multi-select if applicable
            multiSelectMode = currentPuzzle.multiSelect || false;
            selectedDotIds.clear();
            if (multiSelectMode) {
                correctMultiSelectIds = new Set(currentPuzzle.correctDotIds || []);
            }

            const container = document.getElementById('puzzle-container');
            if (multipleChoiceMode) {
                // Build options HTML
                const optionsHtml = multipleChoiceOptions.map(opt =>
                    `<button onclick="window.selectMultipleChoiceAnswer('${opt}')" 
            style="background:#27272a; color:#fff; border:2px solid #3b3b40; padding:16px 24px; margin:8px; font-size:18px; font-weight:500; border-radius:12px; cursor:pointer; transition:all 0.2s; width:200px;"
            onmouseover="this.style.background='#3b3b40'" 
            onmouseout="this.style.background='#27272a'">
            ${opt}
        </button>`
                ).join('');

                container.innerHTML = `
        <div onclick="showLevelPreview()" class="back-btn" style="margin-bottom:16px;">← Back to Puzzles</div>
        <p style="font-size: 22px; font-weight: 500; text-align: center; margin-bottom: 20px; color: #fff;">
            ${currentPuzzle.question}
        </p>
        <div style="display:flex; gap:40px; align-items:flex-start; width:100%;">
            <div class="map-container" id="map-container" style="flex:1;">
                <img src="${currentPuzzle.imageSrc}" alt="CS2 Map Puzzle">
            </div>
            <div style="flex:0 0 350px; display:flex; flex-direction:column; gap:20px; padding:20px;">
                <div style="display:flex; flex-direction:column; align-items:center; gap:12px;">
                    ${optionsHtml}
                </div>
                <div id="puzzle-feedback" style="margin-top:20px;"></div>
            </div>
        </div>
    `;
                renderPuzzleDots();
            } else {
                // Original single-dot / multi-select puzzle rendering
                container.innerHTML = `
        <div onclick="showLevelPreview()" class="back-btn" style="margin-bottom:16px;">← Back to Puzzles</div>
        <p style="font-size: 22px; font-weight: 500; text-align: center; margin-bottom: 20px; color: #fff;">
            ${currentPuzzle.question}
        </p>
        <div class="puzzle-wrapper" id="puzzle-wrapper">
            <div class="map-container" id="map-container">
                <img src="${currentPuzzle.imageSrc}" alt="CS2 Map Puzzle">
            </div>
        </div>
        <div id="puzzle-feedback"></div>
    `;
                renderPuzzleDots();
            }
        };

        window.selectMultipleChoiceAnswer = function (selected) {
            const isCorrect = (selected === multipleChoiceCorrect);
            const feedbackDiv = document.getElementById('puzzle-feedback');
            const key = getCategoryKey();

            if (isCorrect && currentPuzzleLevel === unlockedLevels[key]) {
                unlockedLevels[key] = Math.min(10, currentPuzzleLevel + 1);
            }

            const feedbackHTML = isCorrect
                ? `
            <div style="background:#c084fc; color:#111; padding:24px; border-radius:12px; text-align:center;">
                👾 Correct!<br>
                <strong>${selected} is the right answer.</strong>
                <div style="margin-top:20px;">
                    <button onclick="goToNextLevel()" style="background:#58c2f2; color:#000; border:none; padding:14px 32px; font-size:17px; font-weight:600; border-radius:9999px; cursor:pointer;">
                        Next Puzzle →
                    </button>
                </div>
            </div>`
                : `
            <div style="background:#e8c39e; color:#111; padding:24px; border-radius:12px; text-align:center;">
                🤖 Not quite<br>
                <strong>${selected} is incorrect. Try again!</strong>
            </div>`;

            feedbackDiv.innerHTML = feedbackHTML;
        };

        function updateMultiSelectVisuals() {
            // Reset all CT dots to their side color and remove highlight
            document.querySelectorAll('.blue-dot').forEach(el => {
                const dotId = parseInt(el.textContent);
                const dotData = currentPuzzle.dots.find(d => d.id === dotId);
                if (dotData) {
                    const type = dotData.type || 'ct';
                    el.style.background = type === 'ct' ? '#58c2f2' : '#f59e0b';
                    el.style.boxShadow = type === 'ct' ? '0 0 0 5px rgba(88, 194, 242, 0.4)' : '0 0 0 5px rgba(245, 158, 11, 0.4)';
                }
                el.classList.remove('selected');
            });

            // Highlight selected CT dots with a gold border
            selectedDotIds.forEach(id => {
                const el = Array.from(document.querySelectorAll('.blue-dot')).find(el => parseInt(el.textContent) === id);
                if (el) {
                    el.style.boxShadow = '0 0 0 5px rgba(255, 215, 0, 0.8)';
                    el.classList.add('selected');
                }
            });

            // Update the feedback panel with a "Confirm Answer" button
            const wrapper = document.getElementById('puzzle-wrapper');
            const feedbackHTML = `
        <div class="puzzle-feedback-side" style="background:#27272a; color:#fff;">
            <strong>Selected ${selectedDotIds.size} dot${selectedDotIds.size !== 1 ? 's' : ''}</strong><br><br>
            <button onclick="confirmMultiSelectAnswer()" style="background:#58c2f2; color:#000; border:none; padding:16px 32px; font-size:18px; font-weight:600; border-radius:9999px; cursor:pointer; width:100%;">
                ✅ Confirm Answer
            </button>
            <p style="margin-top:16px; font-size:14px; opacity:0.7;">Click CT dots to select/deselect</p>
        </div>
    `;

            wrapper.innerHTML = `
        <div style="display:flex; gap:40px; align-items:flex-start; width:100%;">
            <div class="map-container" id="map-container" style="flex:1;">
                <img src="${currentPuzzle.imageSrc}" alt="CS2 Map Puzzle">
            </div>
            ${feedbackHTML}
        </div>
    `;

            renderPuzzleDots();
            // Re-apply selection highlights after rendering
            selectedDotIds.forEach(id => {
                const el = Array.from(document.querySelectorAll('.blue-dot')).find(el => parseInt(el.textContent) === id);
                if (el) {
                    el.style.boxShadow = '0 0 0 5px rgba(255, 215, 0, 0.8)';
                    el.classList.add('selected');
                }
            });
        }

        function confirmMultiSelectAnswer() {
            const isCorrect = selectedDotIds.size === correctMultiSelectIds.size &&
                [...selectedDotIds].every(id => correctMultiSelectIds.has(id));

            const wrapper = document.getElementById('puzzle-wrapper');
            const key = getCategoryKey();
            if (isCorrect && currentPuzzleLevel === unlockedLevels[key]) {
                unlockedLevels[key] = Math.min(10, currentPuzzleLevel + 1);
            }

            const feedbackHTML = isCorrect
                ? `
            <div class="puzzle-feedback-side" style="background:#c084fc; color:#111;">
                👾 Correct!<br>
                <strong>You selected the correct setup.</strong>
                <div style="margin-top:25px; display:flex; gap:12px; justify-content:center;">
                    <button onclick="goToNextLevel()" style="background:#58c2f2; color:#000; border:none; padding:14px 32px; font-size:17px; font-weight:600; border-radius:9999px; cursor:pointer;">
                        Next Puzzle →
                    </button>
                </div>
            </div>`
                : `
            <div class="puzzle-feedback-side" style="background:#e8c39e; color:#111;">
                🤖 Not quite<br>
                <strong>That's not the correct setup. Try again.</strong>
                <div style="margin-top:20px;">
                    <button onclick="resetMultiSelect()" style="background:#27272a; color:#fff; border:none; padding:12px 24px; font-size:16px; font-weight:500; border-radius:9999px; cursor:pointer;">
                        Try Again
                    </button>
                </div>
            </div>`;

            wrapper.innerHTML = `
        <div style="display:flex; gap:40px; align-items:flex-start; width:100%;">
            <div class="map-container" id="map-container" style="flex:1;">
                <img src="${currentPuzzle.imageSrc}" alt="CS2 Map Puzzle">
            </div>
            ${feedbackHTML}
        </div>
    `;

            renderPuzzleDots();
            document.getElementById('puzzle-wrapper').scrollIntoView({ behavior: "smooth", block: "center" });
        }

        function resetMultiSelect() {
            selectedDotIds.clear();
            updateMultiSelectVisuals();
        }

        // Make functions globally accessible
        window.confirmMultiSelectAnswer = confirmMultiSelectAnswer;
        window.resetMultiSelect = resetMultiSelect;

        function renderPuzzleDots() {
            const container = document.getElementById('map-container');
            if (!container) return;
            container.querySelectorAll('.blue-dot, .smoke-cloud, .molotov-fire, .flash-bang').forEach(el => el.remove());

            if (!currentPuzzle) return;

            // Render smokes
            if (currentPuzzle.smokes) {
                currentPuzzle.smokes.forEach(smoke => {
                    const el = document.createElement('div');
                    el.className = 'smoke-cloud';
                    el.style.left = smoke.left;
                    el.style.top = smoke.top;
                    container.appendChild(el);
                });
            }

            if (currentPuzzle.molotovs) {
                currentPuzzle.molotovs.forEach(mol => {
                    const el = document.createElement('div');
                    el.className = 'molotov-fire';
                    el.style.left = mol.left;
                    el.style.top = mol.top;
                    for (let i = 0; i < 2; i++) {
                        const tongue = document.createElement('span');
                        tongue.className = 'flame-tongue';
                        el.appendChild(tongue);
                    }
                    container.appendChild(el);
                });
            }

            if (currentPuzzle.flashes) {
                currentPuzzle.flashes.forEach(flash => {
                    const el = document.createElement('div');
                    el.className = 'flash-bang';
                    el.style.left = flash.left;
                    el.style.top = flash.top;
                    for (let i = 0; i < 2; i++) {
                        const arm = document.createElement('span');
                        arm.className = 'star-arm';
                        el.appendChild(arm);
                    }
                    container.appendChild(el);
                });
            }

            // Render dots
            if (currentPuzzle.dots) {
                currentPuzzle.dots.forEach(dot => {
                    const dotEl = document.createElement('div');
                    dotEl.className = 'blue-dot';
                    dotEl.style.left = dot.left;
                    dotEl.style.top = dot.top;
                    dotEl.textContent = dot.id;

                    const dotType = dot.type || 'ct';
                    if (dotType === 'ct') {
                        dotEl.style.background = '#58c2f2';
                        dotEl.style.boxShadow = '0 0 0 5px rgba(88, 194, 242, 0.4)';
                    } else {
                        dotEl.style.background = '#f59e0b';
                        dotEl.style.boxShadow = '0 0 0 5px rgba(245, 158, 11, 0.4)';
                    }

                    dotEl.onclick = () => handleDotClick(dot.id);
                    container.appendChild(dotEl);
                });
            }

            if (lastClickedDotId !== null) {
                const clickedDotEl = Array.from(document.querySelectorAll('.blue-dot')).find(el => parseInt(el.textContent) === lastClickedDotId);
                if (clickedDotEl) {
                    const dotData = currentPuzzle.dots.find(d => d.id === lastClickedDotId);
                    if (dotData) {
                        clickedDotEl.classList.add(dotData.correct ? 'correct' : 'wrong');
                    }
                }
            }

            if (multiSelectMode) {
                selectedDotIds.forEach(id => {
                    const el = Array.from(document.querySelectorAll('.blue-dot')).find(el => parseInt(el.textContent) === id);
                    if (el) {
                        el.style.boxShadow = '0 0 0 5px rgba(255, 215, 0, 0.8)';
                        el.classList.add('selected');
                    }
                });
            }
        }

        function handleDotClick(id) {
            // If in multiple-choice mode, ignore dot clicks
            if (multipleChoiceMode) return;

            const selectedDot = currentPuzzle.dots.find(d => d.id === id);
            if (!selectedDot) return;

            // If in multi-select mode, toggle selection instead of immediate feedback
            if (multiSelectMode) {
                // Only allow selecting CT dots (or all dots? Adjust as needed)
                if (selectedDot.type !== 'ct') return; // Only CT dots are selectable

                if (selectedDotIds.has(id)) {
                    selectedDotIds.delete(id);
                } else {
                    selectedDotIds.add(id);
                }
                updateMultiSelectVisuals();
                return;
            }

            // Original single-dot puzzle logic (unchanged)
            lastClickedDotId = id;
            const isCorrect = selectedDot.correct;
            const dotType = selectedDot.type || 'ct';

            const correctBg = dotType === 'ct' ? '#c084fc' : '#fb923c';
            const wrongBg = dotType === 'ct' ? '#e8c39e' : '#f97316';
            const correctShadow = dotType === 'ct' ? 'rgba(192, 132, 252, 0.6)' : 'rgba(251, 146, 60, 0.6)';
            const wrongShadow = dotType === 'ct' ? 'rgba(232, 195, 158, 0.6)' : 'rgba(249, 115, 22, 0.6)';

            const wrapper = document.getElementById('puzzle-wrapper');
            const gifHTML = (isCorrect && selectedDot.gifSrc)
                ? `<img src="${selectedDot.gifSrc}" alt="Why this is correct" style="width:100%; max-width:none; border-radius:12px; margin-top:20px; display:block; box-shadow:0 4px 15px rgba(0,0,0,0.3);">`
                : '';

            const key = getCategoryKey();
            if (isCorrect && currentPuzzleLevel === unlockedLevels[key]) {
                unlockedLevels[key] = Math.min(10, currentPuzzleLevel + 1);
            }

            const feedbackBgCorrect = dotType === 'ct' ? '#c084fc' : '#fb923c';
            const feedbackBgWrong = dotType === 'ct' ? '#e8c39e' : '#f97316';

            const feedbackHTML = isCorrect
                ? `
            <div class="puzzle-feedback-side" style="background:${feedbackBgCorrect}; color:#111;">
                👾 Correct<br>
                <strong>${selectedDot.expl}</strong>
                ${gifHTML}
                <div style="margin-top:25px; display:flex; gap:12px; justify-content:center;">
                    <button onclick="goToNextLevel()" style="background:#58c2f2; color:#000; border:none; padding:14px 32px; font-size:17px; font-weight:600; border-radius:9999px; cursor:pointer;">
                        Next Puzzle →
                    </button>
                </div>
            </div>`
                : `
            <div class="puzzle-feedback-side" style="background:${feedbackBgWrong}; color:#111;">
                🤖 Not quite<br>
                <strong>${selectedDot.expl}</strong>
            </div>`;

            wrapper.innerHTML = `
        <div style="display:flex; gap:40px; align-items:flex-start; width:100%;">
            <div class="map-container" id="map-container" style="flex:1;">
                <img src="${currentPuzzle.imageSrc}" alt="CS2 Map Puzzle">
            </div>
            ${feedbackHTML}
        </div>
    `;

            renderPuzzleDots();

            document.querySelectorAll('.blue-dot').forEach(el => {
                el.classList.remove('correct', 'wrong');
            });
            const clickedDotEl = Array.from(document.querySelectorAll('.blue-dot')).find(el => parseInt(el.textContent) === id);
            if (clickedDotEl) {
                clickedDotEl.style.background = isCorrect ? correctBg : wrongBg;
                clickedDotEl.style.boxShadow = isCorrect ? `0 0 0 5px ${correctShadow}` : `0 0 0 5px ${wrongShadow}`;
                clickedDotEl.classList.add(isCorrect ? 'correct' : 'wrong');
            }

            document.getElementById('puzzle-wrapper').scrollIntoView({ behavior: "smooth", block: "center" });
        }

        window.goToNextLevel = function () {
            const key = getCategoryKey();
            const maxUnlocked = unlockedLevels[key] || 1;
            if (currentPuzzleLevel < maxUnlocked) {
                loadPuzzleLevel(currentPuzzleLevel + 1);
            } else {
                showLevelPreview();
            }
        };

        window.loadAIGame = function () {
                const main = document.getElementById('main-content');
                main.innerHTML = `
        <div class="ai-game-page">
            <div onclick="loadHome()" class="back-btn">← Back to Home</div>
            <div class="lessons-header">
                <div class="breadcrumb">Play &nbsp;›&nbsp; vs AI</div>
                <h1>AI Practice – Map Overview</h1>
                <p style="color:#aaa;">Ancient Map (Black & White) – Movement coming soon</p>
            </div>
            <div class="map-container" id="map-container">
                <img src="./mapImages/ancientMapBlackWhite.webp" alt="Ancient Map Black/White" style="width:100%; border-radius:8px;">
            </div>
        </div>
    `;
            };

        window.loadHome = function () {
            const main = document.getElementById('main-content');
            main.innerHTML = `
                <div style="height: 100%; display: flex; align-items: center; justify-content: center; flex-direction: column; color: #555; text-align: center;">
                    <h1 style="font-size: 42px; margin-bottom: 16px; color: #58c2f2;">✅ Fixed!</h1>
                    <p style="font-size: 18px; max-width: 420px;">The submenu gap has been fixed.<br>
                    Hover any main button now → submenus stay open smoothly.</p>
                    <p style="margin-top: 30px; font-size: 15px; opacity: 0.6;">Puzzles dots now match your reference image.</p>
                </div>
            `;
        };

        console.log('%c✅ Full code with visual Zone Editor loaded – draw on Ancient map and export spawnConfig.', 'color:#58c2f2; font-weight:600;');
    </script>
